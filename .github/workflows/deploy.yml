name: SYNQ-App CI/CD

on:
  push:
    branches:
      - main

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4


      # Authenticate with Docker Hub using your existing secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Set up the Docker Buildx build engine
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build all stages and push the final hardened image to Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/synq-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  continuous-deployment:
    needs: continuous-integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Copy the docker-compose blueprint over to your EC2 instance
      - name: Copy Docker Compose File to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "docker-compose.yml"
          target: "~/synq-app/"

      # SSH and use Docker Compose driven by AWS SSM Store
      - name: SSH into AWS EC2 and Refresh App Container
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: DOCKERHUB_USERNAME
          script: |
            set -e
            mkdir -p ~/synq-app && cd ~/synq-app

            echo "📦 Fetching live configurations from AWS SSM Parameter Store..."
            aws ssm get-parameters-by-path \
              --path "/config/synq" \
              --with-decryption \
              --query "Parameters[*].[Name,Value]" \
              --output text |
            while IFS=$'\t' read -r key value; do
              echo "${key##*/}=$value"
            done > .env

            # Fail if .env is empty
            if [ ! -s .env ]; then
              echo "❌ ERROR: Generated .env file is empty!"
              exit 1
            fi

            echo "DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME" >> .env

            echo "📥 Pulling fresh image..."
            docker-compose pull

            echo "🚀 Starting containers..."
            docker-compose up -d --force-recreate --remove-orphans

            echo "🧹 Cleaning unused images..."
            docker image prune -f

          env:
            DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}