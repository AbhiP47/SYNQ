<!DOCTYPE html>
<html
        lang="en"
        th:replace="~{base :: parent(~{::div}, ~{::title}, ~{::script})}"
        xmlns:th="http://www.thymeleaf.org"
>
<head>
    <title th:text="${loggedInUser.name} + ' | Profile'">User Profile</title>
</head>
<body>
<div id="content">
    <div th:if="${loggedInUser}">
        <div data-th-replace="~{user/sidebar :: sidebar}"></div>
    </div>

    <div class="sm:pl-64 pt-24 min-h-screen bg-gray-50 dark:bg-gray-900 pb-12 transition-colors duration-200">
        <div class="max-w-4xl mx-auto px-4">

            <div class="relative bg-white dark:bg-gray-800 rounded-2xl shadow-md border border-gray-100 dark:border-gray-700 overflow-hidden">
                <div class="h-32 bg-gradient-to-r from-blue-600 to-indigo-700"></div>

                <div class="relative px-6 pb-6 text-center sm:text-left sm:flex sm:items-end sm:space-x-6 -mt-16">
                    <div class="relative group mx-auto sm:mx-0">
                        <img
                                data-th-src="${loggedInUser.profilePic}"
                                src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=200&h=200&q=80"
                                alt="Profile Photo"
                                class="w-36 h-36 rounded-full border-4 border-white dark:border-gray-800 shadow-xl object-cover bg-white"
                        />
                    </div>
                    <div class="mt-6 sm:mt-0 flex-1 min-w-0">
                        <div class="sm:flex sm:items-center sm:justify-between">
                            <div>
                                <h1 class="text-3xl font-bold text-gray-900 dark:text-white truncate" data-th-text="${loggedInUser.name}">
                                    Abhinav Panwar
                                </h1>
                                <p class="text-indigo-600 dark:text-indigo-400 font-medium text-lg flex items-center justify-center sm:justify-start gap-1">
                                    <span data-th-text="${loggedInUser.provider == 'SELF' ? 'AppShala Developer Account' : 'OAuth Verified Account'}">Account Tier</span>
                                </p>
                            </div>
                            <div class="mt-4 sm:mt-0 flex justify-center space-x-3">
                                <button type="button" class="inline-flex items-center gap-x-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl text-sm transition shadow-sm">
                                    Edit Profile
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-6">

                <div class="space-y-6">
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-md border border-gray-100 dark:border-gray-700">
                        <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">Security Checks</h3>
                        <div class="space-y-3">
                            <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700/50 rounded-xl">
                                <span class="text-sm font-medium text-gray-600 dark:text-gray-300">Email Status</span>
                                <span th:class="${loggedInUser.emailVerified} ? 'px-2.5 py-1 text-xs font-semibold rounded-lg bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400' : 'px-2.5 py-1 text-xs font-semibold rounded-lg bg-amber-100 text-amber-800 dark:bg-amber-900/30 dark:text-amber-400'"
                                      data-th-text="${loggedInUser.emailVerified ? 'VERIFIED' : 'PENDING'}">
                      PENDING
                    </span>
                            </div>
                            <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700/50 rounded-xl">
                                <span class="text-sm font-medium text-gray-600 dark:text-gray-300">Phone Status</span>
                                <span th:class="${loggedInUser.phoneVerified} ? 'px-2.5 py-1 text-xs font-semibold rounded-lg bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400' : 'px-2.5 py-1 text-xs font-semibold rounded-lg bg-amber-100 text-amber-800 dark:bg-amber-900/30 dark:text-amber-400'"
                                      data-th-text="${loggedInUser.phoneVerified ? 'VERIFIED' : 'PENDING'}">
                      PENDING
                    </span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-md border border-gray-100 dark:border-gray-700 text-center sm:text-left">
                        <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Login Provider</h3>
                        <div class="inline-flex items-center gap-2 px-3 py-1.5 bg-gray-100 dark:bg-gray-700 rounded-xl">
                            <span class="w-2.5 h-2.5 rounded-full bg-blue-500"></span>
                            <span class="text-sm font-medium text-gray-700 dark:text-gray-200 uppercase" data-th-text="${loggedInUser.provider}">SELF</span>
                        </div>
                    </div>
                </div>

                <div class="md:col-span-2 space-y-6">
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-md border border-gray-100 dark:border-gray-700">
                        <h3 class="text-lg font-bold text-gray-900 dark:text-white border-b border-gray-100 dark:border-gray-700 pb-3 mb-4">
                            Account Details
                        </h3>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">

                            <div class="min-w-0"> <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">
                                Email Address
                            </label>
                                <p class="text-base font-medium text-gray-900 dark:text-white break-all sm:break-words" data-th-text="${loggedInUser.email}">
                                    abhinavjaipanwar@gmail.com
                                </p>
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">
                                    Phone Number
                                </label>
                                <p class="text-base font-medium text-gray-900 dark:text-white" data-th-text="${loggedInUser.phoneNumber != null && loggedInUser.phoneNumber != '' ? loggedInUser.phoneNumber : 'Not provided'}">
                                    7300539106
                                </p>
                            </div>

                            <div class="sm:col-span-2">
                                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">
                                    About Bio
                                </label>
                                <p class="text-base text-gray-600 dark:text-gray-300 italic whitespace-pre-line" data-th-text="${loggedInUser.about != null && loggedInUser.about != '' ? loggedInUser.about : 'No biography added yet.'}">
                                    hi
                                </p>
                            </div>

                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>

<script>
    console.log("Synq account profile page dashboard loaded successfully.");
</script>
</body>
</html>
