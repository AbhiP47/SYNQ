<!DOCTYPE html>
<html
        lang="en"
        th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}"
        xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>Login</title>
</head>
<body>
<div id="content" >
    <div class="relative max-w-lg mx-auto mt-12 md:mt-20 px-4 sm:px-6">

        <div class="absolute inset-0 bg-indigo-500/5 rounded-2xl blur-3xl pointer-events-none dark:bg-indigo-500/10"></div>

        <div class="relative block p-6 sm:p-10 bg-white border border-slate-200/80 rounded-2xl shadow-xl dark:bg-slate-900 dark:border-slate-800/80 backdrop-blur-sm">

            <div data-th-replace="~{message :: messagebox}"></div>

            <div class="text-center mb-8">
                <span class="inline-block px-3 py-1 text-xs font-mono font-bold uppercase tracking-widest text-black bg-slate-100 border border-slate-200 rounded-full dark:bg-slate-800 dark:border-slate-700 dark:text-cyan-400 mb-4">
                    Security Gateway // Identity Check
                </span>
                <h5 class="text-2xl sm:text-3xl font-black tracking-tight text-slate-900 dark:text-white">
                    Login Here
                </h5>
                <p class="mt-2 text-sm text-slate-600 dark:text-slate-400 font-medium">
                    Start managing your contacts on the cloud easily!
                </p>
            </div>

            <div class="p-3 mb-4 text-sm font-bold font-mono rounded-xl text-center bg-red-50 text-red-600 border border-red-200 dark:bg-red-950/30 dark:text-red-400 dark:border-red-900/50" th:if ="${param.error}">
                <span class="mr-1">[!]</span> Invalid username and password.
            </div>
            <div class="p-3 mb-4 text-sm font-bold font-mono rounded-xl text-center bg-emerald-50 text-emerald-600 border border-emerald-200 dark:bg-emerald-950/30 dark:text-emerald-400 dark:border-emerald-900/50" th:if="${param.logout}">
                <span class="mr-1">[✓]</span> You have been logged out safely.
            </div>

            <form method="post" th:action="@{/authenticate}" class="space-y-5">
                <div>
                    <label for="email" class="block mb-1.5 text-xs font-bold font-mono uppercase tracking-wider text-slate-800 dark:text-slate-300">
                        Your Email
                    </label>
                    <input name="email" type="email" id="email"
                           class="block w-full p-3 text-sm bg-slate-50 border border-slate-200 text-slate-900 rounded-xl placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition duration-200 dark:bg-slate-950 dark:border-slate-800 dark:placeholder-slate-600 dark:text-white dark:focus:bg-slate-950"
                           placeholder="e.g., you@example.com" required />
                </div>

                <div>
                    <label for="password" class="block mb-1.5 text-xs font-bold font-mono uppercase tracking-wider text-slate-800 dark:text-slate-300">
                        Password
                    </label>
                    <input name="password" type="password" id="password"
                           class="block w-full p-3 text-sm bg-slate-50 border border-slate-200 text-slate-900 rounded-xl placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition duration-200 dark:bg-slate-950 dark:border-slate-800 dark:placeholder-slate-600 dark:text-white dark:focus:bg-slate-950"
                           placeholder="••••••••" required />
                </div>

                <div class="flex items-center space-x-4 pt-2">
                    <button type="submit"
                            class="w-1/2 px-5 py-3 text-sm font-bold text-center text-white bg-indigo-600 rounded-xl shadow-md shadow-indigo-600/10 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition duration-200 transform active:scale-[0.99]">
                        Login
                    </button>

                    <button type="reset"
                            class="w-1/2 px-5 py-3 text-sm font-bold text-center text-slate-9000 bg-slate-100 rounded-xl hover:bg-slate-200 transition duration-200  dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
                        Reset
                    </button>
                </div>
            </form>

            <div class="relative flex py-6 items-center">
                <div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
                <span class="flex-shrink mx-4 text-xs font-mono font-bold tracking-wider text-slate-400 dark:text-slate-500">THIRD PARTY INTEGRATIONS</span>
                <div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
            </div>

            <div class="space-y-3">
                <a href="/oauth2/authorization/google"
                   class="flex items-center justify-center w-full px-5 py-3 text-sm font-bold rounded-xl border border-slate-200 bg-white text-cyan-400 shadow-sm hover:bg-slate-50 transition duration-200 dark:bg-slate-950 dark:border-slate-800 dark:text-slate-200 dark:hover:bg-slate-800">
                    <img class="w-4 h-4 mr-3" src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google logo">
                    <span class="text-black dark:text-white">Login with Google</span>
                </a>

                <a href="/oauth2/authorization/linkedin"
                   class="flex items-center justify-center w-full px-5 py-3 text-sm font-bold rounded-xl border border-slate-200 bg-white text-cyan-400 shadow-sm hover:bg-slate-50 transition duration-200 dark:bg-slate-950 dark:border-slate-800 dark:text-slate-200 dark:hover:bg-slate-800">
                    <img class="w-4 h-4 mr-3" src="https://upload.wikimedia.org/wikipedia/commons/8/81/LinkedIn_icon.svg" alt="LinkedIn logo">
                    <span class="text-black dark:text-white">Login with LinkedIn</span>
                </a>
            </div>

        </div>
    </div>
</div>
<script>
    console.log("Login page initialized.");
</script>
</body>
</html>
